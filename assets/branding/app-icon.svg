<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="48%" stop-color="#f7f8fa"/>
      <stop offset="100%" stop-color="#e9ebef"/>
    </linearGradient>

    <linearGradient id="edgeHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="38%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#c9cdd4" stop-opacity="0.35"/>
    </linearGradient>

    <radialGradient id="centerBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A84FF" stop-opacity="0.95"/>
      <stop offset="32%" stop-color="#0A84FF" stop-opacity="0.42"/>
      <stop offset="68%" stop-color="#0A84FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0A84FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="softVignette" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="72%" stop-color="#d8dbe1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#b8bdc7" stop-opacity="0.16"/>
    </radialGradient>

    <!-- Liquid glass ring strokes -->
    <linearGradient id="ringStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="42%" stop-color="#f5f6f8" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#aeb4bf" stop-opacity="0.62"/>
    </linearGradient>

    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feOffset dx="0" dy="8"/>
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="blur" in2="SourceAlpha" operator="out" result="shadow"/>
      <feColorMatrix in="shadow" type="matrix"
        values="0 0 0 0 0.43
                0 0 0 0 0.45
                0 0 0 0 0.50
                0 0 0 0.22 0"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>

    <filter id="glassSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feOffset dy="2" result="offsetBlur"/>
      <feSpecularLighting in="blur" surfaceScale="3" specularConstant="0.45" specularExponent="18" lighting-color="#ffffff" result="spec">
        <fePointLight x="-200" y="-260" z="450"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specOut"/>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="specOut"/>
      </feMerge>
    </filter>

    <filter id="dotShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#9aa0aa" flood-opacity="0.30"/>
    </filter>

    <filter id="blueBloom" x="-220%" y="-220%" width="540%" height="540%">
      <feGaussianBlur stdDeviation="22" result="bloom"/>
      <feColorMatrix in="bloom" type="matrix"
        values="0 0 0 0 0.039
                0 0 0 0 0.518
                0 0 0 0 1.000
                0 0 0 0.78 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="squircleClip">
      <path d="M512 32
               C769 32 992 255 992 512
               C992 769 769 992 512 992
               C255 992 32 769 32 512
               C32 255 255 32 512 32Z"/>
    </clipPath>
  </defs>

  <!-- Squircle base -->
  <g clip-path="url(#squircleClip)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="1024" fill="url(#softVignette)"/>

    <!-- subtle bottom inner shadow -->
    <ellipse cx="512" cy="1038" rx="430" ry="165" fill="#aeb4bf" opacity="0.18"/>
    <ellipse cx="512" cy="-48" rx="420" ry="110" fill="#ffffff" opacity="0.55"/>

    <!-- blue glow, only accent color -->
    <circle cx="512" cy="512" r="88" fill="url(#centerBlue)"/>
  </g>

  <!-- border and liquid glass edge -->
  <path d="M512 32
           C769 32 992 255 992 512
           C992 769 769 992 512 992
           C255 992 32 769 32 512
           C32 255 255 32 512 32Z"
        fill="none" stroke="url(#edgeHighlight)" stroke-width="5"/>

  <path d="M512 45
           C762 45 979 262 979 512
           C979 762 762 979 512 979
           C262 979 45 762 45 512
           C45 262 262 45 512 45Z"
        fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="2"/>

  <!-- concentric translucent glass rings -->
  <g filter="url(#glassSoft)" opacity="0.95">
    <circle cx="512" cy="512" r="132" fill="none" stroke="url(#ringStroke)" stroke-width="5" opacity="0.98"/>
    <circle cx="512" cy="512" r="222" fill="none" stroke="url(#ringStroke)" stroke-width="4.5" opacity="0.78"/>
    <circle cx="512" cy="512" r="322" fill="none" stroke="url(#ringStroke)" stroke-width="4" opacity="0.58"/>
  </g>

  <!-- faint refraction/shadow beside rings -->
  <g opacity="0.23">
    <circle cx="512" cy="516" r="132" fill="none" stroke="#9ca3af" stroke-width="2"/>
    <circle cx="512" cy="516" r="222" fill="none" stroke="#a8aeb8" stroke-width="2"/>
    <circle cx="512" cy="516" r="322" fill="none" stroke="#aeb4bf" stroke-width="2"/>
  </g>

  <!-- central source dot -->
  <circle cx="512" cy="512" r="31" fill="#ffffff" filter="url(#blueBloom)"/>
  <circle cx="501" cy="501" r="10" fill="#ffffff" opacity="0.68"/>

  <!-- receiver dots on outermost ring -->
  <g fill="#ffffff" filter="url(#dotShadow)">
    <circle cx="512" cy="190" r="22"/>
    <circle cx="834" cy="512" r="22"/>
    <circle cx="512" cy="834" r="22"/>
    <circle cx="190" cy="512" r="22"/>
  </g>
</svg>
