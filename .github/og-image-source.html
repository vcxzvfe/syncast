<!DOCTYPE html>
<!--
  SyncCast — GitHub Social Preview Source
  Render: 1280×640 PNG via headless Chrome:

    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
      --headless --disable-gpu \
      --window-size=1280,640 \
      --screenshot=.github/og-image.png \
      --hide-scrollbars \
      "file://$(pwd)/.github/og-image-source.html"

  See .github/SOCIAL_PREVIEW.md for upload instructions.
-->
<html>
<head>
<meta charset="utf-8">
<title>SyncCast — Social Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 640px; overflow: hidden; }
  body {
    background: linear-gradient(135deg, #0a0d10 0%, #1c1c20 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    display: flex;
    align-items: center;
    color: #ffffff;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }
  /* Subtle radial highlight behind the icon for depth */
  body::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 192px;
    width: 520px;
    height: 520px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(10, 132, 255, 0.18) 0%, rgba(10, 132, 255, 0) 65%);
    pointer-events: none;
  }
  .icon-section {
    width: 384px;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1;
  }
  .icon-section img {
    width: 340px;
    height: 340px;
    filter: drop-shadow(0 20px 60px rgba(0, 0, 0, 0.45));
  }
  .text-section {
    flex: 1;
    padding: 0 80px 0 24px;
    z-index: 1;
  }
  h1 {
    font-size: 96px;
    font-weight: 700;
    letter-spacing: -3px;
    margin-bottom: 18px;
    line-height: 1;
  }
  .tagline {
    font-size: 32px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.85);
    margin-bottom: 14px;
    line-height: 1.3;
  }
  .sub-tagline {
    font-size: 22px;
    color: rgba(255, 255, 255, 0.65);
    line-height: 1.4;
  }
  .accent { color: #0A84FF; font-weight: 500; }
  .url {
    font-size: 22px;
    color: rgba(255, 255, 255, 0.55);
    font-family: 'SF Mono', ui-monospace, 'Menlo', monospace;
    margin-top: 36px;
    letter-spacing: 0.2px;
  }
</style>
</head>
<body>
  <div class="icon-section">
    <img src="../assets/branding/app-icon-1024.png" alt="SyncCast">
  </div>
  <div class="text-section">
    <h1>SyncCast</h1>
    <div class="tagline">macOS multi-device audio sync</div>
    <div class="sub-tagline">
      One source &rarr; many outputs. <span class="accent">Local + AirPlay</span> in perfect sync.
    </div>
    <div class="url">github.com/vcxzvfe/syncast</div>
  </div>
</body>
</html>
