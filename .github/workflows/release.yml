name: Release Build Verify

on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build router (release)
        working-directory: core/router
        run: swift build -c release
      - name: Build menubar (release)
        working-directory: apps/menubar
        run: swift build -c release
      - name: Verify .icns exists
        run: test -f apps/menubar/Resources/AppIcon.icns
      - name: Verify VERSION matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -f VERSION ]; then
            VERSION="v$(cat VERSION)"
            if [ "$TAG" != "$VERSION" ]; then
              echo "::warning::Tag $TAG does not match VERSION ($VERSION). Run scripts/release.sh to keep them in sync."
            fi
          else
            echo "::warning::No VERSION file found; skipping tag/version match check."
          fi
