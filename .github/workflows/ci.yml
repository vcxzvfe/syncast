name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  swift:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        package:
          - core/discovery
          - core/router
          - tools/syncast-discover
          - apps/menubar
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build ${{ matrix.package }}
        working-directory: ${{ matrix.package }}
        run: swift build -c debug
      - name: Test ${{ matrix.package }}
        working-directory: ${{ matrix.package }}
        if: matrix.package == 'core/discovery' || matrix.package == 'core/router'
        run: swift test --parallel

  python:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install sidecar
        working-directory: sidecar
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip wheel
          .venv/bin/pip install -e '.[dev]'
      - name: Lint
        working-directory: sidecar
        run: |
          .venv/bin/ruff check src tests
      - name: Type check
        working-directory: sidecar
        run: |
          .venv/bin/mypy src
      - name: Test
        working-directory: sidecar
        run: |
          .venv/bin/pytest -q
