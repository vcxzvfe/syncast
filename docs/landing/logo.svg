<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="SyncCast">
  <title>SyncCast</title>
  <defs>
    <linearGradient id="sc-grad" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A84FF"/>
      <stop offset="1" stop-color="#5E5CE6"/>
    </linearGradient>
  </defs>
  <!-- Sync waves: source at center, dispatching to peripheral receivers -->
  <g stroke="url(#sc-grad)" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M22 32a10 10 0 0 1 20 0"/>
    <path d="M14 32a18 18 0 0 1 36 0"/>
  </g>
  <!-- Peripheral output nodes -->
  <g fill="url(#sc-grad)">
    <circle cx="14" cy="32" r="4"/>
    <circle cx="50" cy="32" r="4"/>
    <circle cx="32" cy="14" r="4"/>
  </g>
  <!-- Source node (center, slightly larger, solid) -->
  <circle cx="32" cy="32" r="5" fill="#0A84FF"/>
</svg>
