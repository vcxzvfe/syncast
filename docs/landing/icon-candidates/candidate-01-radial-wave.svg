<!-- Concept: Radial Wave — central source dot emits concentric sync waves outward to 3 peripheral output nodes, evoking lossless multi-device broadcast. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="SyncCast radial wave icon">
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A84FF"/>
      <stop offset="1" stop-color="#5E5CE6"/>
    </linearGradient>
    <radialGradient id="glow01" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="232" ry="232" fill="url(#bg01)"/>
  <circle cx="512" cy="512" r="320" fill="url(#glow01)"/>
  <g fill="none" stroke="#FFFFFF" stroke-linecap="round">
    <circle cx="512" cy="512" r="120" stroke-opacity="0.85" stroke-width="14"/>
    <circle cx="512" cy="512" r="200" stroke-opacity="0.55" stroke-width="12"/>
    <circle cx="512" cy="512" r="280" stroke-opacity="0.30" stroke-width="10"/>
  </g>
  <circle cx="512" cy="512" r="56" fill="#FFFFFF"/>
  <g fill="#FFFFFF">
    <circle cx="512" cy="180" r="48"/>
    <circle cx="800" cy="660" r="48"/>
    <circle cx="224" cy="660" r="48"/>
  </g>
  <g stroke="#FFFFFF" stroke-width="6" stroke-opacity="0.45" stroke-linecap="round">
    <line x1="512" y1="512" x2="512" y2="180"/>
    <line x1="512" y1="512" x2="800" y2="660"/>
    <line x1="512" y1="512" x2="224" y2="660"/>
  </g>
</svg>
